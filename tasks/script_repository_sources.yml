- name: Script_Repository_Terraform_DNF
  become: true
  tags: scripts
  shell: |
    dnf install -y dnf-plugins-core
    dnf config-manager addrepo --from-repofile=https://rpm.releases.hashicorp.com/fedora/hashicorp.repo
  when: ansible_distribution in ["Fedora", "Rocky"] # Only run task when condition is met.

- name: Script_Repository_Terraform_APT
  become: true
  tags: scripts
  shell: |
    sudo apt-get update && sudo apt-get install -y gnupg software-properties-common
    wget -O- https://apt.releases.hashicorp.com/gpg | gpg --dearmor | tee /usr/share/keyrings/hashicorp-archive-keyring.gpg > /dev/null
  when: ansible_distribution in ["Ubuntu", "Debian"] # Only run task when condition is met.
