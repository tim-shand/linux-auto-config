# REPOS ----------------------------------------- #
# Handles custom repositories (if needed).

- name: Add Hashicorp GPG Key (Debian/Ubuntu)
  become: true
  ansible.builtin.get_url:
    url: https://apt.releases.hashicorp.com/gpg
    dest: /usr/share/keyrings/hashicorp-archive-keyring.gpg
    mode: "0644"
  when: ansible_os_family == "Debian"

- name: Add Hashicorp Repository (Debian/Ubuntu)
  become: true
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com {{ ansible_distribution_release }} main"
    filename: hashicorp
    state: present
  when: ansible_os_family == "Debian"

# ------------------------------------------------------ #

- name: Add Hashicorp Repository (RedHat/Fedora)
  become: true
  ansible.builtin.yum_repository:
    name: hashicorp
    description: Hashicorp Repository
    baseurl: https://rpm.releases.hashicorp.com/fedora/$releasever/$basearch/stable
    gpgcheck: yes
    gpgkey: https://rpm.releases.hashicorp.com/gpg
    state: present
  when: ansible_os_family == "RedHat" # Only run on OS family distributions and flavours.

- name: Add Microsoft GPG Key
  become: true
  rpm_key:
    state: present
    key: https://packages.microsoft.com/keys/microsoft.asc
  when: ansible_os_family == "RedHat"

- name: Add Microsoft Repository
  become: true
  ansible.builtin.yum_repository:
    name: microsoft
    description: Microsoft Repository
    baseurl: https://packages.microsoft.com/rhel/7/prod
    enabled: yes
    gpgcheck: yes
    gpgkey: https://packages.microsoft.com/keys/microsoft.asc
    state: present
  when: ansible_os_family == "RedHat" # Only run on OS family distributions and flavours.
