# REPOS ----------------------------------------- #
# Handles custom repositories (if needed).

# SCRIPTS ------------------------------------------------- #

# Add Terraform to package manager.
- name: Script_Repository_Terraform_APT
  become: true
  tags: scripts
  shell: |
    apt-get update && apt-get install -y gnupg software-properties-common
    wget -O- https://apt.releases.hashicorp.com/gpg | gpg --dearmor | tee /usr/share/keyrings/hashicorp-archive-keyring.gpg > /dev/null
  when: ansible_os_family == "Debian" # Only run on OS family distributions and flavours.

# - name: Script_Repository_Terraform_DNF
